<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, sans-serif">
  <title id="title">Entry flow</title>
  <desc id="desc">process_entry_request: build snapshot, run guards, place bracket, arm exits.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <style>
      .box { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1.2; }
      .accent { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.4; }
      .guard { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.2; }
      .terminal { fill: #e5e7eb; stroke: #d1d5db; stroke-width: 1.2; }
      .title { fill: #111827; font-size: 13px; font-weight: 600; }
      .sub { fill: #6b7280; font-size: 11px; }
      .edge { stroke: #6b7280; stroke-width: 1.4; fill: none; }
      .reject { stroke: #ef4444; stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
      .rejlabel { fill: #ef4444; font-size: 10px; font-weight: 600; }
    </style>
  </defs>

  <!-- Entry request -->
  <g>
    <rect class="accent" x="240" y="20" width="280" height="56" rx="10"/>
    <text class="title" x="380" y="44" text-anchor="middle">EntryRequest received</text>
    <text class="sub" x="380" y="62" text-anchor="middle">symbol, stop_price, exit_strategies</text>
  </g>
  <path class="edge" d="M380,76 L380,108" marker-end="url(#arr)"/>

  <!-- Snapshot -->
  <g>
    <rect class="box" x="220" y="108" width="320" height="56" rx="10"/>
    <text class="title" x="380" y="132" text-anchor="middle">Build TradesSnapshot</text>
    <text class="sub" x="380" y="150" text-anchor="middle">one IB executions fetch</text>
  </g>
  <path class="edge" d="M380,164 L380,196" marker-end="url(#arr)"/>

  <!-- Guards -->
  <g>
    <rect class="guard" x="120" y="196" width="520" height="100" rx="10"/>
    <text class="title" x="380" y="218" text-anchor="middle">Guards</text>
    <text class="sub" x="380" y="238" text-anchor="middle">daily_loss · block_window · total_attempts · per-symbol attempts</text>
    <text class="sub" x="380" y="254" text-anchor="middle">re-entry frequency · consecutive_losses (tier 1/2) · loss_cooldown</text>
    <text class="sub" x="380" y="278" text-anchor="middle" font-style="italic">any fail → return EntryRequestResponse(allowed=False)</text>
  </g>
  <path class="reject" d="M120,246 L40,246 L40,700 L130,700"/>
  <text class="rejlabel" x="46" y="240">on fail</text>
  <path class="edge" d="M380,296 L380,328" marker-end="url(#arr)"/>

  <!-- Quote & sizing -->
  <g>
    <rect class="box" x="220" y="328" width="320" height="60" rx="10"/>
    <text class="title" x="380" y="352" text-anchor="middle">Price &amp; size the order</text>
    <text class="sub" x="380" y="370" text-anchor="middle">bid/ask + stop → entry_price</text>
    <text class="sub" x="380" y="384" text-anchor="middle">risk / (entry − stop) → position_size</text>
  </g>
  <path class="edge" d="M380,388 L380,420" marker-end="url(#arr)"/>

  <!-- Bracket -->
  <g>
    <rect class="accent" x="220" y="420" width="320" height="60" rx="10"/>
    <text class="title" x="380" y="444" text-anchor="middle">place_bracket_order</text>
    <text class="sub" x="380" y="464" text-anchor="middle">parent LMT + protective STP</text>
  </g>
  <path class="edge" d="M380,480 L380,512" marker-end="url(#arr)"/>

  <!-- Arm exits -->
  <g>
    <rect class="box" x="180" y="512" width="400" height="64" rx="10"/>
    <text class="title" x="380" y="536" text-anchor="middle">Arm exit_request rows in DB</text>
    <text class="sub" x="380" y="554" text-anchor="middle">one row per exit_strategy spec</text>
    <text class="sub" x="380" y="568" text-anchor="middle" font-style="italic">per-row errors logged, entry not rolled back</text>
  </g>
  <path class="edge" d="M380,576 L380,608" marker-end="url(#arr)"/>

  <!-- Success terminal -->
  <g>
    <rect class="terminal" x="240" y="608" width="280" height="48" rx="10"/>
    <text class="title" x="380" y="638" text-anchor="middle">EntryRequestResponse(allowed=True)</text>
  </g>

  <!-- Reject terminal -->
  <g>
    <rect class="terminal" x="130" y="680" width="260" height="36" rx="10"/>
    <text class="title" x="260" y="703" text-anchor="middle">EntryRequestResponse(allowed=False)</text>
  </g>
</svg>
